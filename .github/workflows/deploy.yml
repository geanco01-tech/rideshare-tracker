name: Deploy
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Worker
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cat > worker.js << 'WORKEREOF'
          export default {async fetch(r,e){const C={"Access-Control-Allow-Origin":"*","Access-Control-Allow-Methods":"GET,POST,PUT,DELETE,OPTIONS","Access-Control-Allow-Headers":"Content-Type"};const j=(d,s=200)=>new Response(JSON.stringify(d),{status:s,headers:{...C,"Content-Type":"application/json"}});if(r.method==="OPTIONS")return new Response(null,{headers:C});await e.DB.exec("CREATE TABLE IF NOT EXISTS rides(id INTEGER PRIMARY KEY AUTOINCREMENT,month TEXT NOT NULL,day INTEGER NOT NULL,type TEXT NOT NULL,amount REAL NOT NULL DEFAULT 0,status TEXT NOT NULL DEFAULT 'done',tip REAL NOT NULL DEFAULT 0);CREATE TABLE IF NOT EXISTS targets(month TEXT PRIMARY KEY,amount REAL NOT NULL DEFAULT 0);CREATE TABLE IF NOT EXISTS workdays(month TEXT NOT NULL,day INTEGER NOT NULL,checked INTEGER NOT NULL DEFAULT 1,PRIMARY KEY(month,day));CREATE TABLE IF NOT EXISTS history(month TEXT PRIMARY KEY,private_total REAL NOT NULL DEFAULT 0);");const u=new URL(r.url),p=u.pathname,m=r.method;if(p==="/rides"&&m==="GET"){const month=u.searchParams.get("month");if(!month)return j({error:"month required"},400);const{results}=await e.DB.prepare("SELECT * FROM rides WHERE month=? ORDER BY day,id").bind(month).all();return j(results);}if(p==="/rides"&&m==="POST"){const{month,day,type,amount,status,tip}=await r.json();const res=await e.DB.prepare("INSERT INTO rides(month,day,type,amount,status,tip)VALUES(?,?,?,?,?,?)").bind(month,day,type,amount||0,status||"done",tip||0).run();return j({id:res.meta.last_row_id});}if(p.startsWith("/rides/")&&m==="PUT"){const id=p.split("/")[2];const{amount,status,tip,month,day}=await r.json();await e.DB.prepare("UPDATE rides SET amount=?,status=?,tip=?,month=?,day=? WHERE id=?").bind(amount,status,tip||0,month,day,id).run();return j({ok:true});}if(p.startsWith("/rides/")&&m==="DELETE"){const id=p.split("/")[2];await e.DB.prepare("DELETE FROM rides WHERE id=?").bind(id).run();return j({ok:true});}if(p==="/targets"&&m==="GET"){const{results}=await e.DB.prepare("SELECT * FROM targets").all();return j(results);}if(p==="/targets"&&m==="POST"){const{month,amount}=await r.json();await e.DB.prepare("INSERT INTO targets(month,amount)VALUES(?,?)ON CONFLICT(month)DO UPDATE SET amount=excluded.amount").bind(month,amount).run();return j({ok:true});}if(p==="/workdays"&&m==="GET"){const month=u.searchParams.get("month");if(!month)return j({error:"month required"},400);const{results}=await e.DB.prepare("SELECT day,checked FROM workdays WHERE month=?").bind(month).all();return j(results);}if(p==="/workdays"&&m==="POST"){const{month,day,checked}=await r.json();await e.DB.prepare("INSERT INTO workdays(month,day,checked)VALUES(?,?,?)ON CONFLICT(month,day)DO UPDATE SET checked=excluded.checked").bind(month,day,checked?1:0).run();return j({ok:true});}if(p==="/history"&&m==="GET"){const{results}=await e.DB.prepare("SELECT * FROM history").all();return j(results);}if(p==="/history"&&m==="POST"){const{month,private_total}=await r.json();await e.DB.prepare("INSERT INTO history(month,private_total)VALUES(?,?)ON CONFLICT(month)DO UPDATE SET private_total=excluded.private_total").bind(month,private_total).run();return j({ok:true});}return j({error:"Not found"},404);}}
          WORKEREOF
          echo '{"main_module":"worker.js","compatibility_date":"2024-01-01"}' > meta.json
          curl -s -X PUT "https://api.cloudflare.com/
