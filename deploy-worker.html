<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deploy Worker</title>
<style>
  body { font-family: sans-serif; padding: 24px; background: #0f1117; color: #e2e8f0; }
  input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
  input { background: #1a1d27; border: 1px solid #2e3148; color: #e2e8f0; }
  button { background: #818cf8; color: white; border: none; font-weight: 700; cursor: pointer; }
  #status { margin-top: 16px; padding: 12px; border-radius: 8px; background: #1a1d27; font-size: 13px; white-space: pre-wrap; word-break: break-all; }
  .success { color: #4ade80; }
  .error { color: #f87171; }
</style>
</head>
<body>
<h2 style="color:#818cf8">Deploy Rideshare Worker</h2>
<p style="font-size:13px;color:#64748b">Paste your Cloudflare API token below and tap Deploy.</p>
<input type="text" id="token" placeholder="Paste API token here" autocomplete="off" autocorrect="off" spellcheck="false">
<button onclick="deploy()">Deploy Worker</button>
<div id="status">Waiting...</div>

<script>
const ACCOUNT_ID = '4ed0f2a587f8b3d7fc034e583e8ed6a5';
const WORKER_NAME = 'rideshare-api';
const WORKER_CODE = `export default {async fetch(request,env){const CORS={"Access-Control-Allow-Origin":"*","Access-Control-Allow-Methods":"GET,POST,PUT,DELETE,OPTIONS","Access-Control-Allow-Headers":"Content-Type"};const j=(d,s=200)=>new Response(JSON.stringify(d),{status:s,headers:{...CORS,"Content-Type":"application/json"}});if(request.method==="OPTIONS")return new Response(null,{headers:CORS});await env.DB.exec(\`CREATE TABLE IF NOT EXISTS rides(id INTEGER PRIMARY KEY AUTOINCREMENT,month TEXT NOT NULL,day INTEGER NOT NULL,type TEXT NOT NULL,amount REAL NOT NULL DEFAULT 0,status TEXT NOT NULL DEFAULT "done",tip REAL NOT NULL DEFAULT 0);CREATE TABLE IF NOT EXISTS targets(month TEXT PRIMARY KEY,amount REAL NOT NULL DEFAULT 0);CREATE TABLE IF NOT EXISTS workdays(month TEXT NOT NULL,day INTEGER NOT NULL,checked INTEGER NOT NULL DEFAULT 1,PRIMARY KEY(month,day));CREATE TABLE IF NOT EXISTS history(month TEXT PRIMARY KEY,private_total REAL NOT NULL DEFAULT 0);\`);const url=new URL(request.url);const path=url.pathname;const method=request.method;if(path==="/rides"&&method==="GET"){const month=url.searchParams.get("month");if(!month)return j({error:"month required"},400);const{results}=await env.DB.prepare("SELECT * FROM rides WHERE month=? ORDER BY day,id").bind(month).all();return j(results);}if(path==="/rides"&&method==="POST"){const{month,day,type,amount,status,tip}=await request.json();const r=await env.DB.prepare("INSERT INTO rides(month,day,type,amount,status,tip)VALUES(?,?,?,?,?,?)").bind(month,day,type,amount||0,status||"done",tip||0).run();return j({id:r.meta.last_row_id});}if(path.startsWith("/rides/")&&method==="PUT"){const id=path.split("/")[2];const{amount,status,tip,month,day}=await request.json();await env.DB.prepare("UPDATE rides SET amount=?,status=?,tip=?,month=?,day=? WHERE id=?").bind(amount,status,tip||0,month,day,id).run();return j({ok:true});}if(path.startsWith("/rides/")&&method==="DELETE"){const id=path.split("/")[2];await env.DB.prepare("DELETE FROM rides WHERE id=?").bind(id).run();return j({ok:true});}if(path==="/targets"&&method==="GET"){const{results}=await env.DB.prepare("SELECT * FROM targets").all();return j(results);}if(path==="/targets"&&method==="POST"){const{month,amount}=await request.json();await env.DB.prepare("INSERT INTO targets(month,amount)VALUES(?,?)ON CONFLICT(month)DO UPDATE SET amount=excluded.amount").bind(month,amount).run();return j({ok:true});}if(path==="/workdays"&&method==="GET"){const month=url.searchParams.get("month");if(!month)return j({error:"month required"},400);const{results}=await env.DB.prepare("SELECT day,checked FROM workdays WHERE month=?").bind(month).all();return j(results);}if(path==="/workdays"&&method==="POST"){const{month,day,checked}=await request.json();await env.DB.prepare("INSERT INTO workdays(month,day,checked)VALUES(?,?,?)ON CONFLICT(month,day)DO UPDATE SET checked=excluded.checked").bind(month,day,checked?1:0).run();return j({ok:true});}if(path==="/history"&&method==="GET"){const{results}=await env.DB.prepare("SELECT * FROM history").all();return j(results);}if(path==="/history"&&method==="POST"){const{month,private_total}=await request.json();await env.DB.prepare("INSERT INTO history(month,private_total)VALUES(?,?)ON CONFLICT(month)DO UPDATE SET private_total=excluded.private_total").bind(month,private_total).run();return j({ok:true});}return j({error:"Not found"},404);}};`;

async function deploy() {
  const token = document.getElementById('token').value.trim();
  const status = document.getElementById('status');
  if (!token) { status.textContent = 'Please paste your API token first.'; return; }
  
  status.textContent = 'Deploying...';
  
  try {
    const formData = new FormData();
    const metadata = JSON.stringify({
      "main_module": "worker.js",
      "bindings": [],
      "compatibility_date": "2024-01-01"
    });
    formData.append('metadata', new Blob([metadata], {type: 'application/json'}), 'metadata.json');
    formData.append('worker.js', new Blob([WORKER_CODE], {type: 'application/javascript+module'}), 'worker.js');

    const res = await fetch(
      `https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/workers/scripts/${WORKER_NAME}`,
      {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      }
    );
    const data = await res.json();
    if (data.success) {
      status.innerHTML = '<span class="success">✓ Worker deployed successfully!</span>';
    } else {
      status.innerHTML = '<span class="error">Error: ' + JSON.stringify(data.errors) + '</span>';
    }
  } catch(e) {
    status.innerHTML = '<span class="error">Error: ' + e.message + '</span>';
  }
}
</script>
</body>
</html>
